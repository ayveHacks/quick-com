services:
  - type: web
    name: gigprotect-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://gigprotect-backend.onrender.com/api/v1

  - type: web
    name: gigprotect-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: MONGODB_URI
        value: mongodb://mongodb:27017/gigprotect_ai
      - key: PYTHON_VERSION
        value: 3.11

  - type: web
    name: mongodb
    image: mongo:7
    plan: free
