services:
  - type: web
    name: gigprotect-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://gigprotect-backend.onrender.com/api/v1
    routes:
      - path: /
        destination: /

  - type: web
    name: gigprotect-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: MONGODB_URI
        fromService:
          type: pserv
          name: mongodb
          property: connectionString
      - key: MONGODB_DB
        value: gigprotect_ai
      - key: ALLOWED_ORIGINS
        value: https://gigprotect-frontend.onrender.com
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_INTERVAL_MINUTES
        value: "15"

  - type: pserv
    name: mongodb
    plan: free
    ipAllowList: []
