services:
  mongodb:
    image: mongo:7
    container_name: gigprotect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gigprotect-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=gigprotect_ai
      - ALLOWED_ORIGINS=http://localhost:3000
      - SCHEDULER_ENABLED=true
      - SCHEDULER_INTERVAL_MINUTES=15
      - SECRET_KEY=change-this-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gigprotect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  mongo_data:

